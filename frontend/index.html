<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EastTop POS - Solution By IRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --primary:#1a3a4a;
  --primary-dark:#0f2535;
  --accent:#1e7e5e;
  --accent-light:#25a374;
  --accent-hover:#1a6b50;
  --sidebar-bg:#1a3a4a;
  --sidebar-text:#b8cdd9;
  --sidebar-active:#1e7e5e;
  --topbar-bg:#1a3a4a;
  --content-bg:#f0f2f5;
  --card-bg:#fff;
  --border:#e0e6ed;
  --text:#2d3748;
  --text-light:#718096;
  --btn-green:#1e7e5e;
  --btn-red:#e53e3e;
  --btn-blue:#3182ce;
  --btn-orange:#dd6b20;
  --shadow:0 2px 8px rgba(0,0,0,0.08);
  --radius:6px;
  --east-color:#33ccff;
  --top-color:#ff9900;
}
body{font-family:'Inter',sans-serif;background:var(--content-bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:220px;background:var(--sidebar-bg);display:flex;flex-direction:column;height:100vh;overflow-y:auto;overflow-x:hidden;transition:width .2s;flex-shrink:0;}
#sidebar.collapsed{width:50px;}
.sidebar-logo{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,0.1);}
.logo-text{color:var(--east-color);font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden;}
.logo-text span{color:var(--top-color);}
.collapse-btn{margin-left:auto;background:none;border:none;color:var(--sidebar-text);cursor:pointer;font-size:16px;padding:4px;}
.sidebar-nav{flex:1;padding:8px 0;}
.nav-item{cursor:pointer;user-select:none;}
.nav-link{display:flex;align-items:center;gap:10px;padding:9px 16px;color:var(--sidebar-text);font-size:13px;transition:all .15s;white-space:nowrap;overflow:hidden;}
.nav-link:hover{background:rgba(255,255,255,0.07);color:#fff;}
.nav-link.active{background:var(--sidebar-active);color:#fff;}
.nav-link .icon{font-size:15px;min-width:18px;text-align:center;}
.nav-link .arrow{margin-left:auto;font-size:11px;transition:transform .2s;}
.nav-item.open>.nav-link .arrow{transform:rotate(90deg);}
.sub-nav{display:none;background:rgba(0,0,0,0.15);}
.nav-item.open>.sub-nav{display:block;}
.sub-nav .nav-link{padding:7px 16px 7px 38px;font-size:12px;}
#sidebar.collapsed .sub-nav{display:none!important;}
#sidebar.collapsed .nav-link span:not(.icon){display:none;}
#sidebar.collapsed .arrow{display:none;}
#sidebar.collapsed .logo-text{display:none;}
#sidebar.collapsed .sidebar-logo{justify-content:center;padding:12px 0;}
#sidebar.collapsed .collapse-btn{margin:0;}
#sidebar.collapsed .nav-link{justify-content:center;padding:9px 0;}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* TOPBAR */
#topbar{background:var(--topbar-bg);color:#fff;padding:0 20px;height:44px;display:flex;align-items:center;gap:16px;flex-shrink:0;}
.topbar-version{font-size:12px;color:rgba(255,255,255,0.7);}
.topbar-divider{color:rgba(255,255,255,0.3);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.topbar-location{font-size:12px;color:rgba(255,255,255,0.7);}
.topbar-admin{font-size:12px;color:#fff;font-weight:500;display:flex;align-items:center;gap:4px;}
.topbar-update{background:#e53e3e;color:#fff;border:none;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:20px;}
.page{display:none;}
.page.active{display:block;}

/* PAGE HEADER */
.page-header{margin-bottom:18px;}
.page-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:12px;}

/* CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.stat-card{background:var(--card-bg);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);}
.stat-card-header{background:var(--primary);color:#fff;font-size:11px;font-weight:600;padding:6px 10px;border-radius:4px 4px 0 0;margin:-14px -16px 10px;letter-spacing:.5px;}
.stat-card-value{font-size:20px;font-weight:700;color:var(--text);}
.stat-card-date{font-size:11px;color:var(--text-light);margin-top:2px;}

/* CHARTS */
.chart-grid{display:flex;flex-direction:column;gap:14px;margin-bottom:18px;}
.chart-card{background:var(--card-bg);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.chart-title{font-size:12px;font-weight:600;color:#fff;background:var(--primary);padding:6px 12px;border-radius:4px 4px 0 0;margin:-16px -16px 14px;}

/* TABLE */
.table-card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.table-toolbar{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);}
.table-toolbar-title{font-size:14px;font-weight:600;}
.search-box{display:flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:4px;padding:5px 10px;margin-left:auto;}
.search-box input{border:none;outline:none;font-size:13px;width:180px;background:transparent;}
.search-icon{color:var(--text-light);font-size:13px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:#f7f9fc;}
th{padding:10px 12px;text-align:left;font-weight:600;font-size:12px;color:var(--text-light);border-bottom:2px solid var(--border);white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);}
tbody tr:hover{background:#f8fafc;}
.checkbox-col{width:36px;}
input[type=checkbox]{width:14px;height:14px;cursor:pointer;}

/* PAGINATION */
.pagination{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid var(--border);font-size:12px;color:var(--text-light);}
.pagination-info{flex:1;}
.rows-select{border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:12px;}
.page-btn{border:1px solid var(--border);background:#fff;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:12px;}
.page-btn:hover{background:#f0f2f5;}
.page-btn:disabled{opacity:.4;cursor:not-allowed;}
.dense-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-light);}
.toggle-switch{position:relative;display:inline-block;width:32px;height:18px;}
.toggle-switch input{display:none;}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:18px;transition:.3s;}
.toggle-slider:before{content:'';position:absolute;width:14px;height:14px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.3s;}
.toggle-switch input:checked + .toggle-slider{background:var(--accent);}
.toggle-switch input:checked + .toggle-slider:before{transform:translateX(14px);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:4px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;}
.btn-primary{background:var(--btn-green);color:#fff;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-danger{background:var(--btn-red);color:#fff;}
.btn-danger:hover{background:#c53030;}
.btn-info{background:var(--btn-blue);color:#fff;}
.btn-info:hover{background:#2b6cb0;}
.btn-warning{background:var(--btn-orange);color:#fff;}
.btn-secondary{background:#718096;color:#fff;}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border);}
.btn-outline:hover{background:#f0f2f5;}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;}
.btn + .btn{margin-left:6px;}

/* FORMS */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.form-grid-3{grid-template-columns:repeat(3,1fr);}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:12px;font-weight:500;color:var(--text-light);}
.form-control{border:1px solid var(--border);border-radius:4px;padding:7px 10px;font-size:13px;outline:none;transition:border-color .15s;font-family:inherit;}
.form-control:focus{border-color:var(--accent);}
select.form-control{background:#fff;cursor:pointer;}
.form-row{display:flex;align-items:flex-end;gap:10px;}

/* INVOICE PAGE */
.invoice-container{display:grid;grid-template-columns:1fr 280px;gap:14px;}
.invoice-left{background:var(--card-bg);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.invoice-right{display:flex;flex-direction:column;gap:8px;}
.invoice-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.invoice-datetime{font-size:12px;color:var(--text-light);}
.invoice-btn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.invoice-action-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 6px;border-radius:4px;border:none;cursor:pointer;font-size:11px;font-weight:600;gap:3px;transition:all .15s;min-height:52px;}
.invoice-action-btn .shortcut{font-size:10px;font-weight:400;opacity:.8;}
.btn-cash{background:#1e7e5e;color:#fff;}
.btn-credit{background:#2d6a4f;color:#fff;}
.btn-clear-inv{background:#e53e3e;color:#fff;}
.btn-discount{background:#6b46c1;color:#fff;}
.btn-return{background:#2b6cb0;color:#fff;}
.btn-payment{background:#276749;color:#fff;}
.btn-add-cust{background:#2c7a7b;color:#fff;}
.btn-sales-order{background:#4a5568;color:#fff;}
.find-row{display:flex;gap:6px;margin-top:6px;}
.find-row input{flex:1;border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-size:12px;}
.product-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-end;}
.product-row select{flex:1;}
.product-row input[type=number]{width:60px;}
.invoice-items-table{margin-top:10px;}
.invoice-total-row{display:flex;justify-content:space-between;padding:8px 12px;background:#f7f9fc;border-top:2px solid var(--border);font-weight:600;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;display:none;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:8px;padding:24px;width:90%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.modal-lg{max-width:800px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-title{font-size:15px;font-weight:600;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-light);line-height:1;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);}

/* TABS */
.tab-bar{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px;gap:2px;}
.tab-btn{padding:8px 16px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:500;color:var(--text-light);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* REPORT TABS */
.report-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;}
.report-tab{padding:6px 14px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:12px;font-weight:500;color:var(--text-light);transition:all .15s;}
.report-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.report-sub-tabs{display:flex;flex-direction:column;gap:4px;width:140px;flex-shrink:0;}
.report-sub-tab{padding:7px 12px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:12px;font-weight:500;color:var(--text-light);transition:all .15s;text-align:left;}
.report-sub-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.report-content{display:flex;gap:14px;}
.report-main{flex:1;}

/* STATUS BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;}
.badge-success{background:#c6f6d5;color:#276749;}
.badge-danger{background:#fed7d7;color:#c53030;}
.badge-warning{background:#fefcbf;color:#744210;}
.badge-info{background:#bee3f8;color:#2a4365;}

/* ALERTS */
.alert{padding:10px 14px;border-radius:4px;margin-bottom:12px;font-size:13px;display:flex;align-items:center;gap:8px;}
.alert-success{background:#c6f6d5;color:#276749;border:1px solid #9ae6b4;}
.alert-error{background:#fed7d7;color:#c53030;border:1px solid #fc8181;}
.alert-info{background:#bee3f8;color:#2a4365;border:1px solid #90cdf4;}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--primary);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-card{background:#fff;border-radius:10px;padding:40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo h1{font-size:28px;font-weight:800;color:var(--east-color);}
.login-logo h1 span{color:var(--top-color);}
.login-logo p{font-size:12px;color:var(--text-light);margin-top:4px;}
.login-card .form-group{margin-bottom:14px;}
.login-btn{width:100%;margin-top:8px;}
.login-error{color:var(--btn-red);font-size:12px;text-align:center;margin-top:8px;}

/* FOOTER */
.page-footer{text-align:center;font-size:11px;color:var(--text-light);margin-top:24px;padding-top:14px;border-top:1px solid var(--border);}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text-light);font-size:13px;gap:8px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.no-data{text-align:center;padding:30px;color:var(--text-light);font-size:13px;}
.text-right{text-align:right;}
.text-center{text-align:center;}
.text-muted{color:var(--text-light);}
.fw-bold{font-weight:700;}
.mb-10{margin-bottom:10px;}
.mb-14{margin-bottom:14px;}
.flex{display:flex;}
.gap-8{gap:8px;}
.align-center{align-items:center;}
.justify-between{justify-content:space-between;}
.filter-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px;}

/* BARCODE */
.barcode-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);max-width:500px;}
.barcode-preview{border:1px solid var(--border);border-radius:4px;padding:20px;text-align:center;margin:14px 0;font-family:monospace;font-size:24px;letter-spacing:8px;}

/* Responsive table scroll */
.table-wrap{overflow-x:auto;}

@media(max-width:1200px){
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .chart-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <h1>East<span>Top</span></h1>
      <p>Solution By IRM</p>
    </div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input id="login-user" class="form-control" type="text" placeholder="Enter username" value="admin"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input id="login-pass" class="form-control" type="password" placeholder="Enter password" value="admin123"/>
    </div>
    <button class="btn btn-primary login-btn" onclick="doLogin()">Login</button>
    <div id="login-error" class="login-error"></div>
    <div style="margin-top:14px;font-size:11px;color:var(--text-light);text-align:center;">
      Default: admin / admin123
    </div>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-logo" style="cursor:pointer" onclick="navigateTo('dashboard')">
    <span class="logo-text">East<span>Top</span></span>
    <button class="collapse-btn" onclick="event.stopPropagation(); toggleSidebar()">☰</button>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <span class="topbar-version">Version: 2.0.0 | Solution By IRM</span>
    <button class="topbar-update" id="topbar-update-btn" onclick="alert('The application is already up to date.')">App update available ↑</button>
    <div class="topbar-right">
      <span class="topbar-location">Location: <strong>FULL SCREEN [F11]</strong> ⤢</span>
      <span class="topbar-admin" style="cursor:pointer" onclick="logout()">ADMIN 🔒</span>
    </div>
  </div>
  <div id="content">
    <!-- Pages rendered dynamically -->
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
// ============================================================
// CONFIG & STATE
// ============================================================
const API = 'http://localhost:5000/api';
let token = localStorage.getItem('easttop_token') || '';
let currentPage = 'dashboard';
let editingId = null;

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ============================================================
// NAV STRUCTURE
// ============================================================
const NAV = [
  { id:'dashboard', label:'Dashboard', icon:'⊞' },
  { id:'invoice', label:'Invoice', icon:'🛒' },
  { id:'stock', label:'Stock', icon:'📦', children:[
    { id:'grn', label:'GRN' },
    { id:'grn-paid', label:'Paid' },
    { id:'stock-transfer', label:'Transfer' },
    { id:'sales-orders', label:'Sales Order' },
    { id:'sales-quotations', label:'Sales Quotation' },
    { id:'stock-issues', label:'Stock Issue' },
  ]},
  { id:'items', label:'Item & Services', icon:'≡', children:[
    { id:'item-service', label:'Item & Service' },
    { id:'category', label:'Category' },
    { id:'brand', label:'Brand' },
    { id:'bin-location', label:'Bin Location' },
    { id:'colour', label:'Colour' },
    { id:'unit', label:'Unit' },
  ]},
  { id:'customers', label:'Customers', icon:'👥', children:[
    { id:'customer', label:'Customer' },
    { id:'payment-receipt', label:'Payment Receipt' },
    { id:'receipt-reversal', label:'Receipt Reversal' },
    { id:'sales-return', label:'Sales Return' },
    { id:'cheque-receipts', label:'Cheque Receipts', children:[
      { id:'cheques-in-hand', label:'Cheques in hand' },
      { id:'cheques-in-process', label:'Cheques in Process' },
      { id:'returned-cheques', label:'Returned Cheques' },
    ]},
  ]},
  { id:'suppliers', label:'Suppliers', icon:'🏭', children:[
    { id:'supplier', label:'Suppliers' },
    { id:'payment-vouchers', label:'Payment Vouchers' },
    { id:'voucher-reversal', label:'Voucher Reversal' },
    { id:'purchase-return', label:'Purchase Return' },
    { id:'cheque-vouchers', label:'Cheque Vouchers', children:[
      { id:'cheque-vouchers-hand', label:'Cheques in hand' },
      { id:'cheque-vouchers-process', label:'Cheques in Process' },
      { id:'cheque-vouchers-returned', label:'Returned Cheques' },
    ]},
  ]},
  { id:'sales-rep', label:'Sales Rep', icon:'👤', children:[
    { id:'salesrep', label:'Sales Rep' },
    { id:'route', label:'Route' },
  ]},
  { id:'reports', label:'Reports', icon:'📊' },
  { id:'barcode', label:'Barcode', icon:'▦' },
  { id:'expenses', label:'Expenses', icon:'💳', children:[
    { id:'expense-list', label:'Expenses' },
    { id:'expense-types', label:'Expenses Type' },
  ]},
];

// ============================================================
// SIDEBAR RENDER
// ============================================================
function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = buildNavHTML(NAV);
  // click handlers
  nav.querySelectorAll('.nav-link[data-page]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      navigateTo(el.dataset.page);
    });
  });
  nav.querySelectorAll('.nav-link[data-toggle]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const item = el.closest('.nav-item');
      item.classList.toggle('open');
    });
  });
}

function buildNavHTML(items, depth=0) {
  return items.map(item => {
    if (item.children) {
      return `<div class="nav-item">
        <div class="nav-link" data-toggle="${item.id}">
          <span class="icon">${item.icon||'•'}</span>
          <span>${item.label}</span>
          <span class="arrow">›</span>
        </div>
        <div class="sub-nav">${buildNavHTML(item.children, depth+1)}</div>
      </div>`;
    }
    return `<div class="nav-item">
      <div class="nav-link" data-page="${item.id}">
        <span class="icon">${item.icon||'•'}</span>
        <span>${item.label}</span>
      </div>
    </div>`;
  }).join('');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

function setActiveNav(pageId) {
  document.querySelectorAll('#sidebar-nav .nav-link').forEach(el => el.classList.remove('active'));
  const active = document.querySelector(`#sidebar-nav .nav-link[data-page="${pageId}"]`);
  if (active) {

async function doLogin() {
  const username = document.getElementById('login-user').value;
  const password = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  try {
    const res = await fetch(`${API}/auth/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    token = data.token;
    localStorage.setItem('easttop_token', token);
    document.getElementById('login-screen').style.display = 'none';
    init();
  } catch(e) {
    console.error('Login error:', e);
    // If backend not available OR network error, allow demo login
    if (username === 'admin' && password === 'admin123') {
      token = 'demo';
      localStorage.setItem('easttop_token', token);
      document.getElementById('login-screen').style.display = 'none';
      init();
    } else {
      errEl.textContent = 'Login Error: ' + e.message;
    }
  }
}

async function apiFetch(path, opts={}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (token && token !== 'demo') headers['Authorization'] = `Bearer ${token}`;
  try {
    const res = await fetch(`${API}${path}`, { ...opts, headers });
    if (res.status === 401 && token !== 'demo') { logout(); return null; }
    return await res.json();
  } catch(e) {
    // Demo mode - return mock data
    return getMockData(path);
  }
}

function getMockData(path) {
  if (path.startsWith('/dashboard')) return { todaySales: 9024, yesterdaySales: 3024, monthlySales: 300024, annualSales: 5000024, monthlySalesChart: [], date: new Date() };
  return { data: [], total: 0, page: 1, limit: 10 };
}

function logout() {
  token = '';
  localStorage.removeItem('easttop_token');
  location.reload();
}

async function loadInvoiceDropdowns() {
  const [custData, itemData, quotData] = await Promise.all([
    apiFetch('/customers?limit=1000'),
    apiFetch('/items?limit=1000'),
    apiFetch('/sales-quotations?limit=100')
  ]);
  window._allCustomers = custData?.data || [];
  window._allProducts = itemData?.data || [];
  window._allQuotations = quotData?.data || [];
  
  const custList = document.getElementById('inv-customer-list');
  if (custList) {
    custList.innerHTML = window._allCustomers.map(c => `<option value="${c.name}">${c.name} (${c.code})</option>`).join('');
  }
  
  const prodList = document.getElementById('inv-product-list');
  if (prodList) {
    prodList.innerHTML = window._allProducts.map(i => `<option value="${i.name}">${i.name} (${i.code})</option>`).join('');
  }

  const quotList = document.getElementById('inv-quotation-list');
  if (quotList) {
    quotList.innerHTML = window._allQuotations.map(q => `<option value="${q.code}">${q.code} - ${q.customer?.name||''}</option>`).join('');
  }
}

async function loadQuotation(code) {
  if (!code) return;
  const qObj = window._allQuotations.find(q => q.code === code);
  if (!qObj) return;
  const data = await apiFetch('/sales-quotations/' + qObj._id);
  if (!data) return;
  if (data.customer) {
    document.getElementById('inv-customer-search').value = data.customer.name;
    document.getElementById('inv-customer-id').value = data.customer._id;
  }
  window._invItems = (data.items || []).map(i => ({
    id: i.item?._id || i.item,
    name: i.description || i.item?.name || 'Item',
    qty: i.qty,
    unitPrice: i.unitPrice,
    discount: i.discountPct || 0,
    total: i.total
  }));
  renderInvoiceItems();
}

function onCustomerSelect(val) {
  const cust = window._allCustomers.find(c => c.name === val);
  if (cust) {
    document.getElementById('inv-customer-id').value = cust._id;
  } else {
    document.getElementById('inv-customer-id').value = '';
  }
}

function onProductSelect(val) {
  const prod = window._allProducts.find(p => p.name === val);
  if (prod) {
    document.getElementById('inv-price').value = prod.retailPrice || 0;
    window._selectedProductId = prod._id;
  } else {
    window._selectedProductId = null;
  }
}

function addInvoiceItem() {
  const name = document.getElementById('inv-product-search').value;
  const price = parseFloat(document.getElementById('inv-price').value)||0;
  const qty = parseInt(document.getElementById('inv-qty').value)||1;
  const id = window._selectedProductId;
  
  if (!name || !id) return alert('Please select a valid product');
  window._invItems = window._invItems || [];
  window._invItems.push({ id, name, qty, unitPrice: price, discount: 0, total: price*qty });
  
  // Clear inputs
  document.getElementById('inv-product-search').value = '';
  document.getElementById('inv-price').value = '';
  document.getElementById('inv-qty').value = '1';
  window._selectedProductId = null;
  
  renderInvoiceItems();
}

function renderInvoiceItems() {
  const tbody = document.getElementById('inv-items-body');
  const items = window._invItems || [];
  if (!items.length) { tbody.innerHTML = '<tr><td colspan="8" class="no-data">No Data</td></tr>'; updateInvTotal(); return; }
  tbody.innerHTML = items.map((it,i) => `
    <tr>
      <td>${i+1}</td>
      <td>${it.name}</td>
      <td><input type="number" value="${it.qty}" min="1" style="width:50px;border:1px solid var(--border);border-radius:3px;padding:2px 4px;" onchange="updateInvItem(${i},'qty',this.value)"/></td>
      <td>${fmt(it.unitPrice)}</td>
      <td><input type="number" value="${it.discount}" min="0" max="100" style="width:50px;border:1px solid var(--border);border-radius:3px;padding:2px 4px;" onchange="updateInvItem(${i},'discount',this.value)"/></td>
      <td>${fmt(it.unitPrice*it.qty*it.discount/100)}</td>
      <td class="fw-bold">${fmt(it.total)}</td>
      <td><button onclick="removeInvItem(${i})" style="background:#e53e3e;color:#fff;border:none;border-radius:3px;padding:2px 6px;cursor:pointer;">×</button></td>
    </tr>`).join('');
  updateInvTotal();
}
function updateInvItem(i, field, val) {
  const items = window._invItems;
  if (field==='qty') items[i].qty = parseInt(val)||1;
  if (field==='discount') items[i].discount = parseFloat(val)||0;
  const disc = items[i].unitPrice * items[i].qty * items[i].discount / 100;
  items[i].total = items[i].unitPrice * items[i].qty - disc;
  renderInvoiceItems();
}
function removeInvItem(i) { window._invItems.splice(i,1); renderInvoiceItems(); }
function updateInvTotal() {
  const total = (window._invItems||[]).reduce((s,i)=>s+i.total,0);
  const el = document.getElementById('inv-total');
  if (el) el.textContent = 'Rs. ' + fmt(total);
}
function clearInvoice() {
  window._invItems = [];
  renderInvoiceItems();
  const searchEl = document.getElementById('inv-customer-search');
  const idEl = document.getElementById('inv-customer-id');
  if (searchEl) searchEl.value = '';
  if (idEl) idEl.value = '';
}
async function processPayment(method) {
  const items = window._invItems||[];
  if (!items.length) return alert('Please add items to invoice');
  const custName = document.getElementById('inv-customer-search').value;
  const custId = document.getElementById('inv-customer-id').value;
  const total = items.reduce((s,i)=>s+i.total,0);
  const payload = {
    customer: custId || custName || undefined,
    items: items.map(i=>({ item:i.id, description:i.name, qty:i.qty, unitPrice:i.unitPrice, discountPct:i.discount, discountAmt:i.unitPrice*i.qty*i.discount/100, total:i.total })),
    total, paymentMethod: method, status:'A'
  };
  const res = await apiFetch('/invoices',{method:'POST',body:JSON.stringify(payload)});
  if (res && (res._id || res.code)) {
    alert(`Invoice saved! Code: ${res.code||'DEMO'}`);
    clearInvoice();
  } else {
    alert('Invoice saved (demo mode)');
    clearInvoice();
  }
}
function applyDiscount() {
  const pct = prompt('Enter discount %:');
  if (!pct) return;
  (window._invItems||[]).forEach(it => {
    it.discount = parseFloat(pct)||0;
    const disc = it.unitPrice * it.qty * it.discount / 100;
    it.total = it.unitPrice * it.qty - disc;
  });
  renderInvoiceItems();
}
async function findInvoice() {
  const no = document.getElementById('find-invoice-no').value;
  if (!no) return;
  const data = await apiFetch(`/invoices?search=${no}`);
  const msg = document.getElementById('inv-found-msg');
  if (data?.data?.length) msg.textContent = `Found: ${data.data[0].code}`;
  else msg.textContent = 'Invoice not found';
}

async function loadList() {
  const s = window._listState;
  const tbody = document.getElementById('list-tbody');
  if (!tbody) return;
  const data = await apiFetch(`${s.endpoint}?page=${s.page}&limit=${s.limit}&search=${s.search}`);
  if (!data || !data.data) {
    tbody.innerHTML = `<tr><td colspan="${s.columns.length+2}" class="no-data">No data found</td></tr>`;
    return;
  }
  const { data: rows, total, page, limit } = data;
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="${s.columns.length+2}" class="no-data">No item to display</td></tr>`;
  } else {
    tbody.innerHTML = rows.map(row => `
      <tr>
        <td><input type="checkbox"/></td>
        ${s.columns.map(c => `<td>${getCellValue(row, c)}</td>`).join('')}
        <td>
          <button class="btn btn-sm btn-info" onclick='editItem(${JSON.stringify(row._id)})'>✏️</button>
          <button class="btn btn-sm btn-danger" onclick='deleteItem("${row._id}")'>🗑️</button>
        </td>
      </tr>`).join('');
  }
  const from = (page-1)*limit+1, to = Math.min(page*limit, total);
  const pagInfo = document.getElementById('list-pag-info');
  if (pagInfo) pagInfo.textContent = `${total?from:0}–${to} of ${total}`;
  const prevBtn = document.getElementById('list-prev');
  const nextBtn = document.getElementById('list-next');
  if (prevBtn) prevBtn.disabled = page <= 1;
  if (nextBtn) nextBtn.disabled = to >= total;
  s._rows = rows;
}

function getCellValue(row, col) {
  const val = col.key.split('.').reduce((o,k) => o?.[k], row);
  if (val === null || val === undefined) return '-';
  if (col.format) return col.format(val);
  return val;
}

function searchList(val, endpoint, title) {
  window._listState.search = val;
  window._listState.page = 1;
  loadList();
}
function changeListLimit(val, endpoint, title) {
  window._listState.limit = parseInt(val);
  window._listState.page = 1;
  loadList();
}
function changeListPage(dir, endpoint, title) {
  window._listState.page = Math.max(1, window._listState.page + dir);
  loadList();
}

  const data = await apiFetch('/items?limit=500');
  const sel = document.getElementById('barcode-item');
  if (data?.data) data.data.forEach(i=>{ sel.innerHTML+=`<option value="${i.barcode||i.code}" data-name="${i.name}">${i.name} (${i.code})</option>`; });
}
function generateBarcode() {
  const sel = document.getElementById('barcode-item');
  const val = sel.value || document.getElementById('barcode-value').value;
  if (!val) return;
  document.getElementById('barcode-value').value = val;
  const preview = document.getElementById('barcode-preview');
  const name = sel.value ? sel.options[sel.selectedIndex].dataset.name : 'ITEM';
  preview.innerHTML = `
    <div style="font-size:12px;font-weight:600;margin-bottom:8px;">${name}</div>
    <div style="font-family:monospace;font-size:22px;letter-spacing:6px;color:#000;">${val}</div>
    <svg id="barcode-svg" xmlns="http://www.w3.org/2000/svg" width="200" height="50" style="margin-top:8px;">${generateBarsHTML(val)}</svg>
    <div style="font-size:11px;margin-top:4px;">${val}</div>`;
}
function generateBarsHTML(code) {
  let bars=''; let x=10;
  for(let c of code) {
    const w = (c.charCodeAt(0)%3)+1;
    bars+=`<rect x="${x}" y="5" width="${w}" height="38" fill="#000"/>`;
    x+=w+2;
  }
  return bars;
}
function printBarcode() { window.print(); }
function downloadBarcode() { alert('Barcode download - for production use a barcode library like JsBarcode'); }

async function loadExpenses() {
  const data = await apiFetch(`/expenses?page=${window._expPage}&limit=${window._expLimit}`);

  if (!tbody) return;
  if (!data?.data?.length) { tbody.innerHTML='<tr><td colspan="7" class="no-data">No item to display</td></tr>'; return; }
  tbody.innerHTML = data.data.map(e=>`
    <tr>

  const { total, page, limit } = data;

  document.getElementById('exp-pag-info').textContent=`${total?from:0}–${to} of ${total}`;
  document.getElementById('exp-prev').disabled=page<=1;

}

  const types = await apiFetch('/expenses-types?limit=100');
  const typeOpts = (types?.data||[]).map(t=>`<option value="${t._id}">${t.name}</option>`).join('');
  openFormModal('Add Expense',`
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Type</label>
        <input name="typeName" class="form-control" list="exp-types-list" placeholder="Select or type expense type">
        <datalist id="exp-types-list">${typeOpts}</datalist>
      </div>
      <div class="form-group"><label class="form-label">Category</label><input name="category" class="form-control" placeholder="e.g. PT-6280 BOLERO" required/></div>
      <div class="form-group"><label class="form-label">Remarks</label><input name="remarks" class="form-control" required/></div>
      <div class="form-group"><label class="form-label">Total</label><input name="total" class="form-control" type="number" value="0" required/></div>
      <div class="form-group"><label class="form-label">Date</label><input name="date" class="form-control" type="datetime-local" value="${toLocalDatetimeInput()}" required/></div>
    </div>`, async()=>{
    const fields={};
    document.querySelectorAll('#modal-body [name]').forEach(f=>{ if(f.value) fields[f.name]=f.value; });
    await apiFetch('/expenses',{method:'POST',body:JSON.stringify(fields)});
    closeModal(); loadExpenses();
  });
}

// ============================================================
// MODAL HELPER
// ============================================================
function openFormModal(title, bodyHTML, onSave) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = `<form id="modal-form">${bodyHTML}</form>`;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="window._modalSave()">Save</button>`;
  document.getElementById('modal-box').style.maxWidth = '600px';
  window._modalSave = () => {
    const form = document.getElementById('modal-form');
    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }
    onSave();
  };
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ============================================================
// UTILS
// ============================================================
function fmt(n) {
  n = parseFloat(n)||0;
  return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtDate(d) {
  if (!d) return '-';
  const dt = new Date(d);
  if (isNaN(dt)) return '-';
  return dt.toLocaleDateString('en-GB');
}
function fmtDateTime(d) {
  if (!d) return '-';
  const dt = new Date(d);
  if (isNaN(dt)) return '-';
  return dt.toLocaleString('en-GB');
}
function formatDate(d, offset=0) {
  const dt = new Date(d);
  dt.setDate(dt.getDate()+offset);
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat']; return `${days[dt.getDay()]} ${MONTHS[dt.getMonth()]} ${String(dt.getDate()).padStart(2,'0')} ${dt.getFullYear()}`;
}
function today() {
  return new Date().toISOString().substring(0,10);
}
function toLocalDatetimeInput() {
  const now = new Date();
  now.setMinutes(now.getMinutes()-now.getTimezoneOffset());
  return now.toISOString().slice(0,16);
}

  if (e.key==='F11') { e.preventDefault(); document.documentElement.requestFullscreen?.(); }

});
